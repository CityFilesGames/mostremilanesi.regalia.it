<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REGALIA — Milano 2025</title>
<link rel="stylesheet" href="style.css">
<script>
function showSection(id){
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}
</script>
</head>
<body>

<header class="hero">
<div class="overlay">
<h1>REGALIA</h1>
<p>I segni della sovranità tra tardo antico e medioevo</p>
</div>
</header>

<nav>
<button onclick="showSection('home')">Mostra</button>
<button onclick="showSection('objects')">Oggetti</button>
<button onclick="showSection('path')">Percorso</button>
</nav>

<div class="container">

<section id="home" class="section active">
<h2>La mostra</h2>
<p>REGALIA esplora il potere attraverso oggetti reali che lo rendono riconoscibile.</p>
</section>

<section id="objects" class="section">
<div class="card"><img src="teodolinda.jpg"><h3>Corona di Teodolinda</h3></div>
<div class="card"><img src="agilulfo.jpg"><h3>Croce di Agilulfo</h3></div>
<div class="card"><img src="stilicone.jpg"><h3>Dittico di Stilicone</h3></div>
<div class="card"><img src="sigilli.jpg"><h3>Sigilli medievali</h3></div>
<div class="card"><img src="corona.jpg"><h3>Corona Ferrea</h3></div>
</section>

<section id="path" class="section">
<h2>Percorso</h2>
<p>Dal simbolo al riconoscimento.</p>
</section>

</div>

</body>
</html>
